<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول | SportSLite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" href="https://res-console.cloudinary.com/df7chxawb/thumbnails/v1/image/upload/v1784038068/bG9nby1zcG9ydHNMaXRlX3VzN3l5eA==/preview">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-[#121212] font-tajawal overflow-x-hidden w-full relative">

    <div class="w-full min-h-screen bg-[#121212] flex items-center justify-center px-4 md:px-8 py-16 overflow-hidden relative">
        
        <div class="absolute top-20 left-10 w-32 h-32 bg-[#FF5900] rounded-full blur-[80px] opacity-40"></div>
        <div class="absolute bottom-10 right-1/3 w-40 h-40 bg-[#FF5900] rounded-full blur-[100px] opacity-30"></div>
    
        <div class="max-w-[1200px] w-full grid grid-cols-1 lg:grid-cols-2 gap-16 lg:gap-8 items-center relative z-10">
            
            <div class="flex flex-col items-center lg:items-start w-full order-2 lg:order-1">
                
                <div class="w-full max-w-md flex flex-col gap-6">
                    
                    <div class="flex flex-col gap-3">
                        <label class="text-white text-sm md:text-base font-bold text-right">رقم الهاتف أو البريد الالكتروني</label>
                        <input id="email" type="text" placeholder="Ahmad@gmail.com" dir="ltr"
                               class="w-full bg-[#242424] text-gray-300 placeholder-gray-500 border border-[#FF5900]/50 focus:border-[#FF5900] rounded-xl px-5 py-4 outline-none transition-colors text-right shadow-inner">
                    </div>
                    
                    <div class="flex flex-col gap-3">
                        <label class="text-white text-sm md:text-base font-bold text-right">كلمة المرور</label>
                        <div class="relative w-full">
                            <input id="password" type="password" placeholder="••••••••" dir="ltr"
                                   class="w-full bg-[#242424] text-gray-300 placeholder-gray-500 border border-[#FF5900]/50 focus:border-[#FF5900] rounded-xl px-5 py-4 outline-none transition-colors text-right shadow-inner">
                            <!-- أضفنا الـ id هنا -->
                            <i id="toggle-password" class="fa-solid fa-eye absolute left-5 top-1/2 transform -translate-y-1/2 text-gray-400 hover:text-white cursor-pointer transition"></i>
                        </div>
                    </div>
                    
                    <button id="login-btn" class="w-full bg-[#FF5900] hover:bg-orange-600 text-white font-bold text-xl py-4 rounded-full transition-colors shadow-lg shadow-orange-500/30 mt-4">
                        تسجيل دخول
                    </button>
    
                    <div class="text-center mt-2">
                        <p class="text-gray-300 text-sm font-medium">
                            ليس لديك حساب؟ 
                            <a href="sgin.html" class="text-white font-bold hover:text-[#FF5900] transition ml-1">إنشاء حساب</a>
                        </p>
                    </div>
    
                </div>
            </div>
    
            <div class="relative flex justify-center items-center w-full order-1 lg:order-2 translate-x-2 md:translate-x-4 lg:translate-x-10">
                
                <div class="absolute w-[280px] h-[280px] md:w-[400px] md:h-[400px] bg-[#FF5900] rounded-full blur-[40px] opacity-50"></div>
                
                <div class="relative w-[280px] h-[280px] md:w-[400px] md:h-[400px] rounded-full overflow-hidden border-[4px] border-[#121212] z-10 bg-gray-800 shadow-2xl">
                    <!-- تم توحيد الصورة لتكون نفس الصورة الموجودة في صفحة إنشاء الحساب -->
                    <img src="https://images.unsplash.com/photo-1581009146145-b5ef050c2e1e?auto=format&fit=crop&w=800&q=80" alt="مدرب" class="w-full h-full object-cover">
                </div>
    
                <div class="absolute top-10 right-0 md:-right-6 z-20 bg-[#121212] border border-[#FF5900] rounded-[20px] rounded-br-sm px-6 py-2 flex flex-col items-center justify-center shadow-lg transform hover:scale-105 transition cursor-auto select-none">
                    <span class="text-[#FF5900] text-sm md:text-base font-bold">اخسر سعرات</span>
                    <span class="text-[#FF5900] text-sm">-1500</span>
                </div>
    
                <div class="absolute top-1/3 left-3 md:-left-12 z-20 bg-[#121212] border border-[#FF5900] rounded-[20px] rounded-bl-sm px-6 py-2 flex flex-col items-center justify-center shadow-lg transform hover:scale-105 transition cursor-auto select-none">
                    <span class="text-[#FF5900] text-sm md:text-base font-bold">اكسب</span>
                    <span class="text-[#FF5900] text-sm">+2kg</span>
                </div>
    
                <div class="absolute bottom-20 right-4 md:-right-2 z-20 bg-[#121212] border border-[#FF5900] rounded-[20px] rounded-tr-sm px-6 py-2 flex flex-col items-center justify-center shadow-lg transform hover:scale-105 transition cursor-auto select-none">
                    <span class="text-[#FF5900] text-sm md:text-base font-bold">اكسب</span>
                    <span class="text-[#FF5900] text-sm">+2kg</span>
                </div>
    
                <div class="absolute -bottom-4 left-10 md:left-4 z-20 bg-[#121212] border border-[#FF5900] rounded-[20px] rounded-tl-sm px-6 py-2 flex flex-col items-center justify-center shadow-lg transform hover:scale-105 transition cursor-auto select-none">
                    <span class="text-[#FF5900] text-sm md:text-base font-bold">اخسر</span>
                    <span class="text-[#FF5900] text-sm">-8kg</span>
                </div>
                
            </div>
    
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="scripts/app.js"></script>
    <script src="scripts/api/auth-api.js"></script>
    <script src="scripts/ui/login.js"></script>
</body>
</html>
