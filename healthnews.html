<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>healthnews</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-[#121212] font-tajawal overflow-x-hidden w-full relative">

    <div id="header"></div>
    
    <div class="w-full bg-[#121212] py-12 flex mt-10 items-center justify-center gap-3 sm:gap-6 px-4" dir="rtl">
        <div class="h-[2px] flex-shrink w-12 sm:w-32 md:w-64 lg:w-80 bg-gradient-to-r from-[#FF5900] to-transparent rounded-full"></div>
        <h2 class="text-white text-xl sm:text-2xl md:text-3xl font-bold whitespace-nowrap">
            الانظمة الغذائية
        </h2>
        <div class="h-[2px] flex-shrink w-12 sm:w-32 md:w-64 lg:w-80 bg-gradient-to-l from-[#FF5900] to-transparent rounded-full"></div>
    </div>

    <div class="w-full max-w-[1200px] mx-auto px-4 md:px-8 py-2 flex flex-col items-center">
        
        <h1 class="text-white text-xl md:text-3xl lg:text-4xl font-bold text-center leading-relaxed md:leading-snug max-w-3xl mb-8">
            أحدث المقالات والنصائح الصحية والتغذوية لمساعدتك على تحسين نمط حياتك، وتعزيز لياقتك، واتخاذ خيارات غذائية أفضل.
        </h1>

        

        <div id="articles-grid" class="grid grid-cols-1 md:grid-cols-2 gap-6 w-full mb-12">
        </div>

    <div id="footer"></div>

    <script src="scripts/ui/footer.js"></script>
    <script src="scripts/ui/header.js"></script>
    <script src="scripts/api/news-api.js"></script>
    <script src="scripts/ui/health.js"></script>
</body>
</html>
