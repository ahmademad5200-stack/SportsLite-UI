<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خطط الاشتراك | SportSLite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles/trainingProgram.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-[#121212] text-white">

    <div id="header"></div>

    <section class="max-w-7xl mx-auto py-20 px-6 relative">
        <div class="text-center mb-16">
            <h2 class="text-4xl md:text-5xl font-bold mb-4">اختر خطة <span class="text-[#FF5900]">اشتراكك</span></h2>
            <p class="text-gray-400 text-lg">اختر الخطة التي تناسب أهدافك التدريبية وابدأ رحلتك الآن</p>
        </div>

        <!-- أزرار التقليب -->
        <button id="slide-right" class="absolute right-0 top-[60%] -translate-y-1/2 z-10 bg-[#242424] border border-[#FF5900] text-[#FF5900] hover:bg-[#FF5900] hover:text-white w-12 h-12 rounded-full  items-center justify-center transition shadow-lg hidden md:flex">
            <i class="fa-solid fa-chevron-right text-xl"></i>
        </button>

        <!-- حاوية الكروت (السلايدر) -->
        <div id="plans-container" class="flex gap-6 overflow-x-auto snap-x snap-mandatory hide-scrollbar scroll-smooth py-4 px-2">
            <!-- سيتم حقن الكروت هنا بواسطة الجافاسكريبت -->
        </div>

        <button id="slide-left" class="absolute left-0 top-[60%] -translate-y-1/2 z-10 bg-[#242424] border border-[#FF5900] text-[#FF5900] hover:bg-[#FF5900] hover:text-white w-12 h-12 rounded-full items-center justify-center transition shadow-lg hidden md:flex">
            <i class="fa-solid fa-chevron-left text-xl"></i>
        </button>
    </section>

    <div id="footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="scripts/app.js"></script>
    <script src="scripts/ui/header.js"></script>
    <script src="scripts/ui/footer.js"></script>
    <script src="scripts/api/subscription-plans-api.js"></script>
    <script src="scripts/ui/subscription-plans.js"></script>
</body>
</html>
