<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>trainingProgram</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="styles/trainingProgram.css">
</head>
<body class="bg-[#121212] font-tajawal overflow-x-hidden w-full relative">
    <div id="header"></div>

    <div class="w-full bg-[#121212] py-12 flex items-center justify-center mt-20 gap-3 sm:gap-6 px-4" dir="rtl">
        <div class="h-[2px] flex-shrink w-12 sm:w-32 md:w-64 lg:w-80 bg-gradient-to-r from-[#FF5900] to-transparent rounded-full"></div>
        <h2 class="text-white text-xl sm:text-2xl md:text-3xl font-bold whitespace-nowrap">
            البرامج التدريبية
        </h2>
        <div class="h-[2px] flex-shrink w-12 sm:w-32 md:w-64 lg:w-80 bg-gradient-to-l from-[#FF5900] to-transparent rounded-full"></div>
    </div>

    <div class="relative w-full max-w-6xl mx-auto overflow-visible">
        
        <div id="slider" class="flex overflow-x-auto snap-x snap-mandatory hide-scrollbar gap-8 pt-10 pb-20 px-10">
        </div>

        <div class="flex items-center justify-center gap-6 mt-4">
            <button id="prev-btn" class="text-[#FF5900] text-2xl hover:text-white transition-colors cursor-pointer px-4">
                <i class="fa-solid fa-chevron-right"></i>
            </button>
            
            <div class="flex gap-4 text-xl font-bold" id="pagination-dots">
                </div>
            
            <button id="next-btn" class="text-[#FF5900] text-2xl hover:text-white transition-colors cursor-pointer px-4">
                <i class="fa-solid fa-chevron-left"></i>
            </button>
        </div>

    </div>
    <div id="footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <script src="scripts/app.js"></script>
    
    <script src="scripts/api/training-programs-api.js"></script>
    <script src="scripts/ui/trainingProgram.js"></script>
    <script src="scripts/ui/header.js"></script>
    <script src="scripts/ui/footer.js"></script>
</body>
</html>
