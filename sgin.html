<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب | SportSLite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@200;300;400;500;700;800;900&display=swap" rel="stylesheet">
    <style>body { font-family: 'Tajawal', sans-serif; }</style>
</head>
<body class="bg-[#121212] font-tajawal overflow-x-hidden w-full relative">

    <div class="w-full min-h-screen bg-[#121212] flex items-center justify-center px-4 md:px-8 py-16 overflow-hidden relative">
        
        <div class="absolute top-20 left-10 w-32 h-32 bg-[#FF5900] rounded-full blur-[80px] opacity-40"></div>
        <div class="absolute bottom-10 right-1/3 w-40 h-40 bg-[#FF5900] rounded-full blur-[100px] opacity-30"></div>
    
        <div class="max-w-[1200px] w-full grid grid-cols-1 lg:grid-cols-2 gap-16 lg:gap-8 items-center relative z-10">
            
            <div class="flex flex-col items-center lg:items-start w-full order-2 lg:order-1">
                
                <div class="w-full max-w-md flex flex-col gap-6">
                    <h2 class="text-3xl md:text-4xl font-bold text-white mb-2">ابدأ <span class="text-[#FF5900]">رحلتك</span> الآن</h2>
                    <p class="text-gray-400 mb-4">أنشئ حسابك وانضم لمجتمع الأبطال للحصول على برامجك وتدريباتك.</p>
                    
                    <div class="flex flex-col gap-3">
                        <label class="text-white text-sm md:text-base font-bold text-right">الاسم الكامل</label>
                        <input id="full_name" type="text" placeholder="ادخل اسمك هنا" 
                               class="w-full bg-[#242424] text-white placeholder-gray-500 border border-[#FF5900]/50 focus:border-[#FF5900] rounded-xl px-5 py-4 outline-none transition-colors text-right shadow-inner">
                    </div>
    
                    <div class="flex flex-col gap-3">
                        <label class="text-white text-sm md:text-base font-bold text-right">البريد الالكتروني</label>
                        <input id="email" type="email" placeholder="example@domain.com" dir="ltr"
                               class="w-full bg-[#242424] text-white placeholder-gray-500 border border-[#FF5900]/50 focus:border-[#FF5900] rounded-xl px-5 py-4 outline-none transition-colors text-right shadow-inner">
                    </div>
    
                    <div class="flex flex-col gap-3">
                        <label class="text-white text-sm md:text-base font-bold text-right">رقم الهاتف</label>
                        <input id="phone" type="tel" placeholder="(+963) 0933333333" dir="ltr"
                               class="w-full bg-[#242424] text-white placeholder-gray-500 border border-[#FF5900]/50 focus:border-[#FF5900] rounded-xl px-5 py-4 outline-none transition-colors text-right shadow-inner">
                    </div>
                    
                    <div class="flex flex-col gap-3">
                        <label class="text-white text-sm md:text-base font-bold text-right">كلمة المرور</label>
                        <div class="relative w-full">
                             <input id="password" type="password" placeholder="••••••••" dir="ltr"
                                    class="w-full bg-[#242424] text-white placeholder-gray-500 border border-[#FF5900]/50 focus:border-[#FF5900] rounded-xl px-5 py-4 outline-none transition-colors text-right shadow-inner">
                            <i class="fa-solid fa-eye absolute left-5 top-1/2 transform -translate-y-1/2 text-gray-400 hover:text-white cursor-pointer transition"></i>
                        </div>
                    </div>
    
                    <button id="register-btn" class="w-full bg-[#FF5900] hover:bg-orange-600 text-white font-bold text-xl py-4 rounded-full transition-colors shadow-lg shadow-orange-500/30 mt-4">
                        إنشاء حساب
                    </button>
    
                    <div class="text-center mt-2">
                        <p class="text-gray-300 text-sm font-medium">
                            هل لديك حساب مسبقاً؟ 
                            <a href="login.html" class="text-white font-bold hover:text-[#FF5900] transition ml-1">تسجيل دخول</a>
                        </p>
                    </div>
    
                </div>
            </div>
    
            <div class="relative flex justify-center items-center w-full order-1 lg:order-2 lg:-translate-x-6">
                
                <div class="relative w-[260px] h-[260px] sm:w-[280px] sm:h-[280px] md:w-[400px] md:h-[400px] mt-4 mb-8 lg:my-0 mx-auto">
                    
                    <div class="absolute inset-0 bg-[#FF5900] rounded-full blur-[40px] opacity-50"></div>
                    
                    <div class="relative w-full h-full rounded-full overflow-hidden border-[4px] border-[#121212] z-10 bg-gray-800 shadow-2xl">
                        <img src="https://images.unsplash.com/photo-1581009146145-b5ef050c2e1e?auto=format&fit=crop&w=800&q=80" alt="تدريب" class="w-full h-full object-cover">
                    </div>
    
                    <div class="absolute top-4 -right-4 md:top-10 md:-right-8 z-20 bg-[#121212] border border-[#FF5900] rounded-[20px] rounded-bl-sm px-4 py-1.5 md:px-6 md:py-2 flex flex-col items-center justify-center shadow-lg transform hover:scale-105 transition cursor-auto select-none">
                        <span class="text-[#FF5900] text-xs md:text-base font-bold">اخسر سعرات</span>
                        <span class="text-[#FF5900] text-xs md:text-sm">-1500</span>
                    </div>
    
                    <div class="absolute top-1/3 -left-4 md:-left-12 z-20 bg-[#121212] border border-[#FF5900] rounded-[20px] rounded-br-sm px-4 py-1.5 md:px-6 md:py-2 flex flex-col items-center justify-center shadow-lg transform hover:scale-105 transition cursor-auto select-none">
                        <span class="text-[#FF5900] text-xs md:text-base font-bold">اكسب</span>
                        <span class="text-[#FF5900] text-xs md:text-sm">+2kg</span>
                    </div>
    
                    <div class="absolute bottom-10 -right-4 md:bottom-20 md:-right-6 z-20 bg-[#121212] border border-[#FF5900] rounded-[20px] rounded-tl-sm px-4 py-1.5 md:px-6 md:py-2 flex flex-col items-center justify-center shadow-lg transform hover:scale-105 transition cursor-auto select-none">
                        <span class="text-[#FF5900] text-xs md:text-base font-bold">اكسب</span>
                        <span class="text-[#FF5900] text-xs md:text-sm">+2kg</span>
                    </div>
    
                    <div class="absolute -bottom-4 left-6 md:-bottom-2 md:left-8 z-20 bg-[#121212] border border-[#FF5900] rounded-[20px] rounded-tr-sm px-4 py-1.5 md:px-6 md:py-2 flex flex-col items-center justify-center shadow-lg transform hover:scale-105 transition cursor-auto select-none">
                        <span class="text-[#FF5900] text-xs md:text-base font-bold">اخسر</span>
                        <span class="text-[#FF5900] text-xs md:text-sm">-8kg</span>
                    </div>
    
                </div>
                
            </div>
    
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="scripts/app.js"></script>
    <script src="scripts/api/auth-api.js"></script>
    <script src="scripts/ui/sgin.js"></script>
</body>
</html>
