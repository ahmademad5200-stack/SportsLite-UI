<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>equipment</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" href="https://res-console.cloudinary.com/df7chxawb/thumbnails/v1/image/upload/v1784038068/bG9nby1zcG9ydHNMaXRlX3VzN3l5eA==/preview">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-[#121212] font-tajawal overflow-x-hidden w-full relative text-white min-h-screen">
    
    <div id="header"></div>

    <div class="w-full max-w-[1200px] mx-auto px-4 md:px-8 mt-10 pt-8 pb-4 flex flex-col items-center gap-8" >
        <div class="flex flex-col sm:flex-row items-center justify-center gap-4 w-full max-w-3xl">
            <button class="w-full sm:w-1/3 bg-[#FF5900] text-white font-bold text-lg py-3.5 rounded-full hover:bg-orange-600 transition duration-300 shadow-lg shadow-orange-500/20">
                ابحث
            </button>
            <div class="relative w-full sm:w-2/3">
                <input type="text" placeholder="ابحث عن جهاز" 
                       class="w-full bg-[#242424] text-white placeholder-gray-400 border border-gray-700 rounded-xl py-3.5 pr-5 pl-12 focus:outline-none focus:border-[#FF5900] transition duration-300 shadow-inner">
                <i class="fa-solid fa-magnifying-glass absolute left-5 top-1/2 transform -translate-y-1/2 text-gray-400 text-lg"></i>
            </div>
        </div>

        <div class="bg-[#242424] border border-gray-800 rounded-xl px-6 py-3.5 flex flex-wrap items-center justify-center gap-6 md:gap-10 shadow-md">
            <div class="flex items-center gap-3">
                <div class="w-4 h-4 rounded-full bg-[#F5A623] shadow-[0_0_8px_rgba(245,166,35,0.5)]"></div>
                <span class="text-white text-sm md:text-base font-medium">الجهاز مستخدم</span>
            </div>
            <div class="flex items-center gap-3">
                <div class="w-4 h-4 rounded-full bg-green-600 shadow-[0_0_8px_rgba(22,163,74,0.5)]"></div>
                <span class="text-white text-sm md:text-base font-medium">الجهاز متاح</span>
            </div>
            <div class="flex items-center gap-3">
                <div class="w-4 h-4 rounded-full bg-red-600 shadow-[0_0_8px_rgba(220,38,38,0.5)]"></div>
                <span class="text-white text-sm md:text-base font-medium">الجهاز قيد الصيانة</span>
            </div>
        </div>
    </div>

    <div class="max-w-[1200px] mx-auto px-4 md:px-8">
        <div id="equipment-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 md:gap-8 pt-4 pb-10">
            </div>
    </div>

    <div id="deviceModal" class="fixed inset-0 z-[100] bg-black/80 hidden items-center justify-center p-4 overflow-y-auto">
        <div class="relative bg-[#242424] rounded-[20px] w-full max-w-3xl shadow-2xl border border-gray-700 m-auto mt-10 mb-10 overflow-hidden flex flex-col">
            
            <div class="bg-[#1A1A1A] w-full py-4 relative flex items-center justify-center border-b border-gray-800">
                <button onclick="closeDeviceModal()" class="absolute left-4 w-8 h-8 bg-transparent hover:text-[#FF5900] text-gray-400 rounded-full flex items-center justify-center transition duration-300">
                    <i class="fa-solid fa-xmark text-2xl"></i>
                </button>
                <h2 id="modal-title" class="text-xl md:text-2xl font-bold text-white">العنوان رح يتغير من الجافا سكريبت</h2>
            </div>

           
            
            <div class="w-full flex justify-center m-0">
                <img id="modal-image" src="" alt="" class="h-[120px] md:h-[150px] object-contain">
            </div>

            <div class="w-full flex items-center justify-center mb-10">
                <div class="h-[2px] flex-1 max-w-[150px] bg-gradient-to-l from-[#FF5900] to-transparent"></div>
                <h3 class="text-lg md:text-xl font-bold text-white whitespace-nowrap">طريقة الاستخدام</h3>
                <div class="h-[2px] flex-1 max-w-[150px] bg-gradient-to-r from-[#FF5900] to-transparent"></div>
            </div>

            <div class="w-full max-w-2xl text-right mb-40 m-5">
                <ol id="modal-instructions" class="text-gray-200 text-sm md:text-base leading-loose font-medium flex flex-col gap-2 list-decimal list-inside">
                    </ol>
            </div>
            
        </div>
    </div>
    
    <div id="footer"></div>

    <script src="scripts/ui/footer.js"></script>
    <script src="scripts/ui/header.js"></script>
    <script src="scripts/api/equipment-api.js"></script>
    <script src="scripts/ui/equipment.js"></script>
</body>
</html>
